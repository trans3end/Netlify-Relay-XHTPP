[build]
  command = "npm run build"
  publish = "public"

# Edge function configuration with optimizations
[[edge_functions]]
  function = "relay"
  path = "/*"
  
  # Edge function specific settings
  [edge_functions.relay]
    # In-production optimizations
    on_error = "bypass"  # Don't show internal errors
    cache = "manual"      # Manual caching control

# Performance headers for static assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    
    # Cache static assets aggressively
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for better routing (optional)
[[redirects]]
  from = "/health"
  to = "/api/health"
  status = 200
  force = true