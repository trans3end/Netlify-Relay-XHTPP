[build]
  command = "npm run build"
  publish = "public"

[[edge_functions]]
  function = "relay"
  path = "/*"

# Optional: Security headers for any static responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
